<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=0">
    <title>GPS Speedometer - Online</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            background-color: #12131A;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            min-height: 100vh;
            padding: 40px 20px;
            overflow: hidden;
        }
        .header-panel {
            text-align: center;
        }
        .title {
            font-size: 14px;
            font-weight: bold;
            color: #29aafe;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 15px;
        }
        .gps-data-box {
            display: flex;
            gap: 15px;
            justify-content: center;
        }
        .gps-tag {
            background-color: #1a1b24;
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 6px 12px;
            border-radius: 4px;
            font-family: monospace;
            font-size: 12px;
        }
        .gps-tag span {
            color: #888;
        }
        .meter-container {
            position: relative;
            width: 280px;
            height: 280px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .meter-dial {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 2px dashed rgba(41, 170, 254, 0.2);
        }
        .speed-center {
            text-align: center;
            z-index: 2;
        }
        #speed-text {
            font-size: 85px;
            font-weight: 900;
            line-height: 1;
            font-family: 'Courier New', Courier, monospace;
            color: #ffffff;
            text-shadow: 0 0 20px rgba(41, 170, 254, 0.5);
        }
        .unit-text {
            font-size: 16px;
            color: #888;
            margin-top: 5px;
            font-weight: 500;
            letter-spacing: 1px;
        }
        .control-panel {
            width: 100%;
            max-width: 360px;
            text-align: center;
        }
        .status-message {
            font-size: 13px;
            color: #aaa;
            margin-bottom: 15px;
            line-height: 1.5;
            min-height: 40px;
        }
        .btn-gps {
            background-color: #29aafe;
            color: #fff;
            border: none;
            padding: 14px 28px;
            font-size: 15px;
            font-weight: bold;
            border-radius: 30px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(41, 170, 254, 0.4);
            transition: all 0.2s ease;
        }
        .btn-gps:hover {
            background-color: #1492e6;
        }
        .active-gps {
            animation: pulse 2s infinite;
            background-color: #00ff66 !important;
            color: #000 !important;
            box-shadow: 0 4px 15px rgba(0, 255, 102, 0.4);
        }
        @keyframes pulse {
            0 { box-shadow: 0 0 0 0 rgba(0, 255, 102, 0.7); }
            70% { box-shadow: 0 0 0 10px rgba(0, 255, 102, 0); }
            100% { box-shadow: 0 0 0 0 rgba(0, 255, 102, 0); }
        }
        #accuracy-val {
            font-size: 11px;
            color: #555;
            margin-top: 10px;
            font-family: monospace;
        }
    </style>
</head>
<body>

    <div class="header-panel">
        <div class="title">GPS Speedometer Online</div>
        <div class="gps-data-box">
            <div class="gps-tag"><span>LAT:</span> <span id="lat-val" style="color:#fff">0.000000</span></div>
            <div class="gps-tag"><span>LNG:</span> <span id="lng-val" style="color:#fff">0.000000</span></div>
        </div>
    </div>

    <div class="meter-container">
        <div class="meter-dial"></div>
        <div class="speed-center">
            <div id="speed-text">0</div>
            <div class="unit-text">Km/h</div>
        </div>
    </div>

    <div class="control-panel">
        <div class="status-message" id="status-msg">
            Nhấp nút bên dưới để cấp quyền định vị vệ tinh và bắt đầu đo tốc độ di chuyển thực tế.
        </div>
        <button class="btn-gps" id="start-btn" onclick="requestGpsPermission()">
            KÍCH HOẠT ĐO GPS
        </button>
        <div id="accuracy-val"></div>
    </div>

    <script>
        let watchId = null;

        function requestGpsPermission() {
            const statusMsg = document.getElementById('status-msg');
            const startBtn = document.getElementById('start-btn');

            if (!navigator.geolocation) {
                statusMsg.innerHTML = "<span style='color: #ff4a4a;'>Trình duyệt không hỗ trợ API định vị GPS.</span>";
                return;
            }

            statusMsg.innerText = "Đang kết nối hệ thống xin quyền truy cập vị trí...";

            const gpsOptions = {
                enableHighAccuracy: true,
                timeout: 10000,
                maximumAge: 0
            };

            watchId = navigator.geolocation.watchPosition(updateSpeedometer, handleGpsError, gpsOptions);
            
            startBtn.innerText = "ĐANG HOẠT ĐỘNG";
            startBtn.classList.add('active-gps');
            startBtn.disabled = true;
        }

        function updateSpeedometer(position) {
            const coords = position.coords;
            
            document.getElementById('lat-val').innerText = coords.latitude.toFixed(6);
            document.getElementById('lng-val').innerText = coords.longitude.toFixed(6);
            document.getElementById('accuracy-val').innerText = `Độ sai số vị trí: ±${coords.accuracy.toFixed(1)} mét`;

            let rawSpeed = coords.speed;

            if (rawSpeed === null || rawSpeed < 0 || isNaN(rawSpeed)) {
                document.getElementById('speed-text').innerText = "0";
                document.getElementById('status-msg').innerText = "Đã nhận sóng GPS thành công. Hãy di chuyển để nhảy số.";
            } else {
                let speedInKmH = rawSpeed * 3.6;
                document.getElementById('speed-text').innerText = Math.round(speedInKmH);
                document.getElementById('status-msg').innerText = "Hệ thống đang đồng bộ dữ liệu vệ tinh liên tục!";
            }
        }

        function handleGpsError(error) {
            const statusMsg = document.getElementById('status-msg');
            const startBtn = document.getElementById('start-btn');
            
            startBtn.innerText = "THỬ LẠI KẾT NỐI";
            startBtn.classList.remove('active-gps');
            startBtn.disabled = false;

            switch(error.code) {
                case error.PERMISSION_DENIED:
                    statusMsg.innerHTML = "<span style='color: #ff4a4a;'>LỖI: Bạn đã bấm từ chối cấp quyền. Hãy vào cài đặt trang web trên trình duyệt để đổi sang 'Cho phép'.</span>";
                    break;
                case error.POSITION_UNAVAILABLE:
                    statusMsg.innerHTML = "<span style='color: #ffbc4a;'>LỖI: Thiết bị chưa bật định vị tổng (GPS). Vui lòng bật 'Vị trí' trên điện thoại.</span>";
                    break;
                case error.TIMEOUT:
                    statusMsg.innerHTML = "<span style='color: #ffbc4a;'>LỖI: Hết thời gian chờ vệ tinh phản hồi. Hãy ra vùng không gian thoáng hơn để nhận sóng.</span>";
                    break;
                default:
                    statusMsg.innerHTML = "<span style='color: #ff4a4a;'>Lỗi hệ thống định vị không xác định.</span>";
                    break;
            }
        }
    </script>
</body>
</html>
