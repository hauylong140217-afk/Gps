<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=0">
    <title>Advanced GPS Speedometer & Compass</title>
    <style>
        /* --- 1. RESET & NỀN GIAO DIỆN --- */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            background-color: #0d0e12;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            min-height: 100vh;
            padding: 30px 20px;
            overflow-x: hidden;
        }

        /* --- 2. THANH THÔNG TIN VỆ TINH TRÊN CÙNG --- */
        .header-panel {
            text-align: center;
            width: 100%;
            max-width: 450px;
        }
        .title {
            font-size: 13px;
            font-weight: 800;
            color: #29aafe;
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-bottom: 12px;
        }
        .gps-data-box {
            display: flex;
            gap: 10px;
            justify-content: center;
        }
        .gps-tag {
            background: linear-gradient(145deg, #16171f, #111217);
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 8px 14px;
            border-radius: 8px;
            font-family: monospace;
            font-size: 12px;
            box-shadow: inset 0 1px 1px rgba(255,255,255,0.05);
        }
        .gps-tag span {
            color: #566573;
            fontWeight: bold;
        }

        /* --- 3. KHU VỰC ĐỒNG HỒ & LA BÀN TRUNG TÂM --- */
        .main-meter-wrapper {
            position: relative;
            width: 320px;
            height: 320px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        /* Vòng tròn định vị hướng (La bàn xoay) */
        .compass-ring {
            position: absolute;
            width: 100%;
            height: 100%;
            border: 2px dashed rgba(41, 170, 254, 0.15);
            border-radius: 50%;
            transition: transform 0.5s ease-out;
        }
        .compass-direction {
            position: absolute;
            font-size: 12px;
            font-weight: bold;
            color: rgba(255, 255, 255, 0.3);
        }
        .dir-n { top: 8px; left: 50%; transform: translateX(-50%); color: #ff4a4a; }
        .dir-e { right: 8px; top: 50%; transform: translateY(-50%); }
        .dir-s { bottom: 8px; left: 50%; transform: translateX(-50%); }
        .dir-w { left: 8px; top: 50%; transform: translateY(-50%); }

        .speed-display {
            text-align: center;
            z-index: 2;
        }
        #speed-text {
            font-size: 100px;
            font-weight: 900;
            line-height: 0.9;
            font-family: 'Arial Black', Gadget, sans-serif;
            color: #ffffff;
            text-shadow: 0 0 30px rgba(41, 170, 254, 0.6);
        }
        .unit-text {
            font-size: 14px;
            color: #7f8c8d;
            text-transform: uppercase;
            font-weight: bold;
            letter-spacing: 2px;
            margin-top: 5px;
        }

        /* --- 4. BẢNG THỐNG KÊ HIỆU NĂNG DI CHUYỂN --- */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            width: 100%;
            max-width: 400px;
            margin: 20px 0;
        }
        .stat-card {
            background: linear-gradient(145deg, #14151b, #0f1014);
            border: 1px solid rgba(255, 255, 255, 0.03);
            border-radius: 12px;
            padding: 12px;
            text-align: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
        .stat-label {
            font-size: 11px;
            color: #7f8c8d;
            text-transform: uppercase;
            margin-bottom: 5px;
            letter-spacing: 1px;
        }
        .stat-value {
            font-size: 20px;
            font-weight: bold;
            font-family: monospace;
            color: #fff;
        }

        /* --- 5. HỆ THỐNG NÚT BẤM & TRẠNG THÁI --- */
        .control-panel {
            width: 100%;
            max-width: 400px;
            text-align: center;
        }
        .status-message {
            font-size: 13px;
            color: #95a5a6;
            margin-bottom: 18px;
            line-height: 1.6;
            min-height: 42px;
            padding: 0 10px;
        }
        .btn-gps {
            background: linear-gradient(135deg, #29aafe, #1482e6);
            color: #fff;
            border: none;
            padding: 16px 36px;
            font-size: 15px;
            font-weight: 800;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 6px 20px rgba(41, 170, 254, 0.4);
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            letter-spacing: 1px;
        }
        .btn-gps:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(41, 170, 254, 0.6);
        }
        .active-gps {
            animation: pulseGlow 2s infinite;
            background: linear-gradient(135deg, #00ff66, #00cb52) !important;
            color: #060709 !important;
            box-shadow: 0 6px 20px rgba(0, 255, 102, 0.4);
        }
        @keyframes pulseGlow {
            0% { box-shadow: 0 0 0 0 rgba(0, 255, 102, 0.7); }
            70% { box-shadow: 0 0 0 12px rgba(0, 255, 102, 0); }
            100% { box-shadow: 0 0 0 0 rgba(0, 255, 102, 0); }
        }
        #accuracy-text {
            font-size: 11px;
            color: #4a4d5a;
            margin-top: 12px;
            font-family: monospace;
        }
    </style>
</head>
<body>

    <!-- PHẦN ĐỈNH ĐẦU: TỌA ĐỘ TINH TINH -->
    <div class="header-panel">
        <div class="title">Hệ Thống Đo Vệ Tinh GPS Pro</div>
        <div class="gps-data-box">
            <div class="gps-tag"><span>VĨ ĐỘ (LAT):</span> <id id="lat-val" style="color: #fff">0.000000</id></div>
            <div class="gps-tag"><span>KINH ĐỘ (LNG):</span> <id id="lng-val" style="color: #fff">0.000000</id></div>
        </div>
    </div>

    <!-- PHẦN TRUNG TÂM: ĐỒNG HỒ TỐC ĐỘ VÀ LA BÀN XOAY -->
    <div class="main-meter-wrapper">
        <div class="compass-ring" id="compass">
            <div class="compass-direction dir-n">N</div>
            <div class="compass-direction dir-e">E</div>
            <div class="compass-direction dir-s">S</div>
            <div class="compass-direction dir-w">W</div>
        </div>
        <div class="speed-display">
            <div id="speed-text">0</div>
            <div class="unit-text">Km/h</div>
        </div>
    </div>

    <!-- PHẦN GIỮA: KHU VỰC THỐNG KÊ (MAX SPEED, AVG SPEED...) -->
    <div class="stats-grid">
        <div class="stat-card">
            <div class="stat-label">Tốc độ tối đa</div>
            <div class="stat-value" id="max-speed">0 <span style="font-size:12px; color:#555">km/h</span></div>
        </div>
        <div class="stat-card">
            <div class="stat-label">Hướng đi</div>
            <div class="stat-value" id="heading-val">--°</div>
        </div>
    </div>

    <!-- PHẦN DƯỚI CÙNG: ĐIỀU KHIỂN & BÁO LỖI -->
    <div class="control-panel">
        <div class="status-message" id="status-msg">
            Nhấp nút kích hoạt hệ thống. Ứng dụng tích hợp bộ đo hướng (Heading) và máy tính vận tốc tối đa thời gian thực.
        </div>
        <button class="btn-gps" id="start-btn" onclick="initGpsEngine()">
            KÍCH HOẠT HỆ THỐNG
        </button>
        <div id="accuracy-text">Chưa nhận diện luồng sóng GPS</div>
    </div>

    <script>
        let trackingId = null;
        let topRecordedSpeed = 0;

        function initGpsEngine() {
            const statusMsg = document.getElementById('status-msg');
            const startBtn = document.getElementById('start-btn');

            if (!navigator.geolocation) {
                statusMsg.innerHTML = "<span style='color: #ff4a4a;'>LỖI: Trình duyệt của bạn đã quá cũ, không hỗ trợ định vị API Geolocation.</span>";
                return;
            }

            statusMsg.innerText = "Đang bắt đầu quét tín hiệu phần cứng của thiết bị...";

            const options = {
                enableHighAccuracy: true, // Ép dùng chip GPS chuyên dụng của máy để tính km/h mượt nhất
                timeout: 15000,           // Cho phép tối đa 15 giây để thiết bị kết nối với vệ tinh ngoài trời
                maximumAge: 0             // Không lấy dữ liệu cũ trong bộ nhớ đệm
            };

            // Hàm kích hoạt bộ theo dõi chuyển động thời gian thực
            trackingId = navigator.geolocation.watchPosition(processGpsMetrics, catchGpsFault, options);

            startBtn.innerText = "HỆ THỐNG ĐANG CHẠY";
            startBtn.classList.add('active-gps');
            startBtn.disabled = true;
        }

        function processGpsMetrics(position) {
            const data = position.coords;
            
            // 1. Cập nhật Kinh - Vĩ độ
            document.getElementById('lat-val').innerText = data.latitude.toFixed(6);
            document.getElementById('lng-val').innerText = data.longitude.toFixed(6);
            
            // 2. Hiển thị độ sai số bán kính (mét)
            document.getElementById('accuracy-text').innerText = `Bán kính sai số phần cứng: ±${data.accuracy.toFixed(1)} mét`;

            // 3. Xử lý logic đo góc xoay hướng di chuyển (La bàn dựa trên GPS)
            if (data.heading !== null && !isNaN(data.heading)) {
                let angle = data.heading;
                document.getElementById('heading-val').innerText = `${Math.round(angle)}°`;
                // Xoay ngược vòng tròn la bàn để chữ N luôn hướng về đúng hướng Bắc thực tế ngoài đời
                document.getElementById('compass').style.transform = `rotate(${-angle}deg)`;
            } else {
                document.getElementById('heading-val').innerText = "--°";
            }

            // 4. Tính toán quy đổi vận tốc di chuyển
            let calculatedSpeedMs = data.speed;

            if (calculatedSpeedMs === null || calculatedSpeedMs < 0 || isNaN(calculatedSpeedMs)) {
                document.getElementById('speed-text').innerText = "0";
                document.getElementById('status-msg').innerText = "Định vị thành công! Hãy cầm thiết bị di chuyển ngoài đường để kim nhảy số.";
            } else {
                // Quy đổi m/s sang Km/h chuẩn khoa học định vị
                let speedKmH = calculatedSpeedMs * 3.6;
                let finalIntegerSpeed = Math.round(speedKmH);

                // Hiển thị tốc độ hiện tại
                document.getElementById('speed-text').innerText = finalIntegerSpeed;

                // Kiểm tra và cập nhật kỷ lục Tốc độ tối đa (Max Speed) trong phiên chạy
                if (speedKmH > topRecordedSpeed) {
                    topRecordedSpeed = speedKmH;
                    document.getElementById('max-speed').innerHTML = `${Math.round(topRecordedSpeed)} <span style='font-size:12px; color:#555'>km/h</span>`;
                }

                document.getElementById('status-msg').innerText = "Tín hiệu vệ tinh hoạt động bình thường.";
            }
        }

        function catchGpsFault(error) {
            const statusMsg = document.getElementById('status-msg');
            const startBtn = document.getElementById('start-btn');
            
            startBtn.innerText = "KÍCH HOẠT LẠI";
            startBtn.classList.remove('active-gps');
            startBtn.disabled = false;

            switch(error.code) {
                case error.PERMISSION_DENIED:
                    statusMsg.innerHTML = "<span style='color: #ff4a4a;'>BẠN ĐÃ TỪ CHỐI cấp quyền. Hãy mở cài đặt trình duyệt để chuyển quyền vị trí thành 'Cho phép'.</span>";
                    break;
                case error.POSITION_UNAVAILABLE:
                    statusMsg.innerHTML = "<span style='color: #ffbc4a;'>THIẾT BỊ TẮT ĐỊNH VỊ. Vui lòng bật vị trí (GPS) trên thanh trạng thái điện thoại.</span>";
                    break;
                case error.TIMEOUT:
                    statusMsg.innerHTML = "<span style='color: #ffbc4a;'>HẾT THỜI GIAN. Sóng vệ tinh yếu do bạn đang ở trong nhà. Hãy di chuyển ra ban công hoặc ngoài trời.</span>";
                    break;
                default:
                    statusMsg.innerHTML = "<span style='color: #ff4a4a;'>Lỗi định vị phần cứng không xác định.</span>";
                    break;
            }
        }
    </script>
</body>
</html>
